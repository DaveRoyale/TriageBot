<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compliance Incident Triage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f4f5f7;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
    header span { font-size: 12px; opacity: 0.7; }

    #type-indicators {
      display: flex;
      gap: 6px;
      padding: 8px 24px;
      background: #f0f4f8;
      border-bottom: 1px solid #dde1e9;
      min-height: 34px;
      align-items: center;
    }

    #type-indicators .label { font-size: 11px; color: #666; margin-right: 4px; }

    .type-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
      background: #1a3a5c;
      color: white;
    }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .msg.bot {
      background: #ffffff;
      border: 1px solid #dde1e9;
      align-self: flex-start;
    }

    .msg.user {
      background: #1a3a5c;
      color: white;
      align-self: flex-end;
    }

    .msg.summary {
      background: #eef4fb;
      border: 1px solid #b3cfe8;
      align-self: flex-start;
      max-width: 85%;
      font-size: 13px;
    }

    .msg.thinking {
      background: #f0f0f0;
      color: #888;
      align-self: flex-start;
      font-style: italic;
      font-size: 13px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      background: white;
      border-top: 1px solid #dde1e9;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #c8cdd8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
    }

    #user-input:focus { outline: none; border-color: #1a3a5c; }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #send-btn {
      background: #1a3a5c;
      color: white;
    }

    #send-btn:hover { background: #15304d; }
    #send-btn:disabled { background: #8a9ab0; cursor: default; }

    #report-btn {
      background: #2e7d32;
      color: white;
    }

    #report-btn:hover { background: #256427; }
    #report-btn:disabled { background: #8a9ab0; cursor: default; }

    /* ── Report panel ── */
    .report-panel {
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #dde1e9;
      background: white;
    }

    .report-panel.hidden { display: none; }

    .report-header {
      padding: 14px 18px;
      background: #2e7d32;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .report-header span { font-size: 14px; font-weight: 600; }

    #copy-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 12px;
      padding: 5px 10px;
    }

    #copy-btn:hover { background: rgba(255,255,255,0.35); }

    #report-content {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: "Georgia", serif;
    }

    #copy-confirm {
      font-size: 11px;
      color: #cce8cc;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<header>
  <h1>Compliance Incident Triage</h1>
  <span>For internal use only — do not enter real incident data during testing</span>
</header>

<div id="type-indicators"></div>

<div class="workspace">
  <div class="chat-panel">
    <div id="messages"></div>
    <div class="input-row">
      <textarea id="user-input" rows="2" placeholder="Describe the incident or answer the question above…"></textarea>
      <button id="send-btn">Send</button>
      <button id="report-btn">Generate Report</button>
    </div>
  </div>

  <div class="report-panel hidden" id="report-panel">
    <div class="report-header">
      <span>Draft Report</span>
      <div>
        <button id="copy-btn">Copy</button>
        <span id="copy-confirm">Copied</span>
      </div>
    </div>
    <div id="report-content"></div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const reportBtn = document.getElementById("report-btn");
  const reportPanel = document.getElementById("report-panel");
  const reportContent = document.getElementById("report-content");
  const copyBtn = document.getElementById("copy-btn");
  const copyConfirm = document.getElementById("copy-confirm");
  const typeIndicators = document.getElementById("type-indicators");

  let history = [];
  let incidentTypes = [];

  const TYPE_LABELS = {
    privacy_breach: "Privacy Breach",
    banking_code: "Banking Code of Practice",
  };

  function updateTypeIndicators() {
    typeIndicators.innerHTML = "";
    if (incidentTypes.length === 0) return;
    const label = document.createElement("span");
    label.className = "label";
    label.textContent = "Detected:";
    typeIndicators.appendChild(label);
    incidentTypes.forEach(t => {
      const badge = document.createElement("span");
      badge.className = "type-badge";
      badge.textContent = TYPE_LABELS[t] || t;
      typeIndicators.appendChild(badge);
    });
  }

  function appendMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function setLoading(loading) {
    sendBtn.disabled = loading;
    reportBtn.disabled = loading;
    inputEl.disabled = loading;
  }

  async function sendMessage(userText) {
    history.push({ role: "user", content: userText });
    appendMessage("user", userText);

    const thinking = appendMessage("thinking", "…");
    setLoading(true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, incident_types: incidentTypes }),
      });
      const data = await res.json();
      thinking.remove();

      if (!res.ok) throw new Error(data.detail || "Server error");

      const reply = data.reply;
      history.push({ role: "assistant", content: reply });

      if (data.incident_types) {
        incidentTypes = data.incident_types;
        updateTypeIndicators();
      }

      if (data.ready_for_report) {
        reportBtn.style.background = "#1b5e20";
      }

      const msgClass = reply.startsWith("Here is what I have recorded") ? "summary" : "bot";
      const div = document.createElement("div");
      div.className = "msg " + msgClass;
      div.textContent = reply;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (err) {
      thinking.remove();
      appendMessage("bot", "Error: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  async function generateReport() {
    const thinking = appendMessage("thinking", "Generating report…");
    setLoading(true);

    try {
      const res = await fetch("/api/report", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, incident_types: incidentTypes }),
      });
      const data = await res.json();
      thinking.remove();

      if (!res.ok) throw new Error(data.detail || "Server error");

      reportContent.textContent = data.report;
      reportPanel.classList.remove("hidden");
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (err) {
      thinking.remove();
      appendMessage("bot", "Error generating report: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  sendBtn.addEventListener("click", () => {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendMessage(text);
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  reportBtn.addEventListener("click", generateReport);

  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(reportContent.textContent).then(() => {
      copyConfirm.style.opacity = "1";
      setTimeout(() => copyConfirm.style.opacity = "0", 2000);
    });
  });

  // Open with a greeting from the bot
  (async () => {
    setLoading(true);
    const thinking = appendMessage("thinking", "…");
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: [{ role: "user", content: "Hello" }], incident_types: [] }),
      });
      const data = await res.json();
      thinking.remove();
      if (res.ok) {
        history.push({ role: "user", content: "Hello" });
        history.push({ role: "assistant", content: data.reply });
        appendMessage("bot", data.reply);
      }
    } catch (_) {
      thinking.remove();
      appendMessage("bot", "Could not connect to server.");
    } finally {
      setLoading(false);
    }
  })();
</script>
</body>
</html>
